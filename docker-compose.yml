version: '3.8'

services:
  db:
    image: postgres:16
    container_name: pymes_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: pymes_db
      POSTGRES_USER: pymes_user
      POSTGRES_PASSWORD: pymes_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pymes_backend
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://pymes_user:pymes_pass@db:5432/pymes_db
      NODE_ENV: development
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pymes_frontend
    restart: unless-stopped
    ports:
      - "3000:5173"
    environment:
      VITE_API_URL: http://localhost:3001
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
